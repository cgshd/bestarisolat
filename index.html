<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนโครงการ - Bestari Sholat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>

    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react-dom/client": "https://esm.sh/react-dom@18/client",
            "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // 1. นำเข้า React และไลบรารีต่างๆ
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Settings, Users, ClipboardList, CheckCircle2, Search, Save, AlertCircle, Download, Sparkles, Loader2, MessageSquareHeart, Lock, Unlock, Upload, FileSpreadsheet, Trash2, RefreshCw, User } from 'lucide-react';

        // 2. ข้อมูลจำลองตั้งต้นจากระบบ (สำหรับกรณีเชื่อมต่อ Google Sheets ไม่สำเร็จ)
        const defaultStudentData = [
          { id: '26858', title: 'เด็กชาย', firstName: 'อัซรี', lastName: 'เตะ', room: 'ม.1 Berdikari' },
          { id: '26906', title: 'เด็กชาย', firstName: 'ชารีฟ', lastName: 'ตีมุง', room: 'ม.1 Berdikari' },
          { id: '26913', title: 'เด็กชาย', firstName: 'อัซวาน', lastName: 'มะแซ', room: 'ม.1 Berdikari' },
          { id: '26920', title: 'เด็กชาย', firstName: 'นัสรุดดีน', lastName: 'สุหลง', room: 'ม.1 Amanah' },
          { id: '26931', title: 'เด็กชาย', firstName: 'แวมูฮัมมัด', lastName: 'เซ็ง', room: 'ม.1 Amanah' },
          { id: '26955', title: 'เด็กชาย', firstName: 'ธนภัตร์', lastName: 'หมัดเลียด', room: 'ม.1 Amanah' },
          { id: '27043', title: 'เด็กชาย', firstName: 'มูฮัมหมัดชารีฟ', lastName: 'มะแซ', room: 'ม.1 Amanah' },
        ];

        // 3. ฟังก์ชันหลักของระบบ
        function App() {
          const [activeTab, setActiveTab] = useState('register');
          
          const [projectSettings, setProjectSettings] = useState({
            title: 'Bestari Sholat Kali Ke-2',
            description: 'โครงการอบรมและทดสอบการปฏิบัติศาสนกิจ (ละหมาด) สำหรับนักเรียน',
            date: '2026-07-15',
            googleScriptUrl: 'https://script.google.com/macros/s/AKfycbwoE_DRewCKTouoFuAUoX_lQU-ZqsQa2t2tqGxV4BZ5RHkqpnOg4G8LHMHkszOUm0x2/exec' // ใส่ค่าเริ่มต้นตามที่ส่งมา
          });

          // ระบบฐานข้อมูลนักเรียน
          const [studentDb, setStudentDb] = useState([]);
          const [dbSource, setDbSource] = useState('loading'); // 'loading', 'sheet', 'local', 'default'
          const [isLoadingDb, setIsLoadingDb] = useState(false);
          const [dbError, setDbError] = useState('');

          // ระบบรหัสผ่านหน้าตั้งค่า
          const [isUnlocked, setIsUnlocked] = useState(false);
          const [passwordInput, setPasswordInput] = useState('');
          const [passwordError, setPasswordError] = useState('');

          const [searchId, setSearchId] = useState('');
          const [studentInfo, setStudentInfo] = useState(null);
          const [isSubmitting, setIsSubmitting] = useState(false);
          const [submitStatus, setSubmitStatus] = useState(null);
          const [registeredList, setRegisteredList] = useState([]);

          const [aiTopic, setAiTopic] = useState('');
          const [isGeneratingDesc, setIsGeneratingDesc] = useState(false);
          const [descAiError, setDescAiError] = useState('');
          
          const [aiWelcomeMessage, setAiWelcomeMessage] = useState('');
          const [isGeneratingWelcome, setIsGeneratingWelcome] = useState(false);
          const [registeredName, setRegisteredName] = useState('');

          const [uploadError, setUploadError] = useState('');
          const [uploadSuccess, setUploadSuccess] = useState('');
          const [isUploadingDb, setIsUploadingDb] = useState(false);
          
          // เก็บสถานะโหลดรูปภาพผิดพลาด
          const [imgError, setImgError] = useState(false);

          // ฟังก์ชันดึงข้อมูลนักเรียนจาก Google Sheet
          const fetchDatabaseFromSheet = async (url) => {
            if (!url) {
              setStudentDb(defaultStudentData);
              setDbSource('default');
              return;
            }
            setIsLoadingDb(true);
            setDbError('');
            try {
              // ดึงข้อมูลผ่าน action=getStudents
              const res = await fetch(`${url}?action=getStudents`);
              if (!res.ok) throw new Error('เครือข่ายตอบสนองไม่ปกติ');
              const data = await res.json();
              
              if (Array.isArray(data) && data.length > 0) {
                setStudentDb(data);
                setDbSource('sheet');
                setDbError('');
                // บันทึกสำรองข้อมูลล่าสุดในเครื่องด้วย
                localStorage.setItem('student_database', JSON.stringify(data));
              } else {
                throw new Error('โครงสร้างข้อมูลในชีทไม่ถูกต้อง หรือไม่มีข้อมูลนักเรียน');
              }
            } catch (err) {
              console.error("Error fetching database from Sheet:", err);
              setDbError('เชื่อมต่อ Google Sheet ล้มเหลว จะใช้ฐานข้อมูลสำรองในเครื่องแทน');
              
              // โหลดจาก Local Storage สำรอง
              const savedDb = localStorage.getItem('student_database');
              if (savedDb) {
                try {
                  const parsed = JSON.parse(savedDb);
                  if (Array.isArray(parsed) && parsed.length > 0) {
                    setStudentDb(parsed);
                    setDbSource('local');
                    return;
                  }
                } catch(e) {}
              }
              // ถ้าไม่มีอะไรเลย ใช้ default ดั้งเดิม
              setStudentDb(defaultStudentData);
              setDbSource('default');
            } finally {
              setIsLoadingDb(false);
            }
          };

          // โหลดข้อมูลนักเรียนเมื่อเข้าใช้งานและเมื่อ Google Apps Script URL เปลี่ยนแปลง
          useEffect(() => {
            fetchDatabaseFromSheet(projectSettings.googleScriptUrl);
          }, [projectSettings.googleScriptUrl]);

          const callGeminiAPI = async (prompt) => {
            const apiKey = "YOUR_API_KEY_HERE"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const maxRetries = 5;
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { 
                      parts: [{ text: "คุณคือผู้ช่วย AI สำหรับโรงเรียนสอนศาสนาอิสลามในประเทศไทย มีความสุภาพ เป็นมิตร และใช้ภาษาที่เหมาะสมกับการให้ความรู้หรือให้กำลังใจนักเรียน" }] 
                    }
                  })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!generatedText) throw new Error("No text generated");
                return generatedText;
              } catch (error) {
                if (i === maxRetries - 1) throw error; 
                const delay = 1000 * Math.pow(2, i);
                await new Promise(resolve => setTimeout(resolve, delay));
              }
            }
          };

          const handleGenerateDescription = async () => {
            if (!aiTopic.trim()) {
              setDescAiError("กรุณาระบุหัวข้อที่ต้องการให้ AI ช่วยเขียน");
              setTimeout(() => setDescAiError(''), 3000);
              return;
            }
            setIsGeneratingDesc(true);
            setDescAiError('');
            try {
              const prompt = `ช่วยเขียนรายละเอียดโครงการแบบเป็นทางการสำหรับกิจกรรมของโรงเรียนมุสลิม ชื่อโครงการ: "${projectSettings.title}" โดยมีเนื้อหาเกี่ยวข้องกับ: "${aiTopic}" ขอให้เขียนสรุปสั้นๆ ประมาณ 1 ย่อหน้า ไม่เกิน 3-4 ประโยค เพื่อนำไปแสดงบนหน้าเว็บไซต์`;
              const generatedText = await callGeminiAPI(prompt);
              setProjectSettings(prev => ({ ...prev, description: generatedText.trim() }));
              setAiTopic('');
            } catch (error) {
              console.error("AI Generation Error:", error);
              setDescAiError("เกิดข้อผิดพลาดในการเชื่อมต่อกับ AI กรุณาลองใหม่อีกครั้ง");
            } finally {
              setIsGeneratingDesc(false);
            }
          };

          const generateWelcomeMessage = async (fullName) => {
            setIsGeneratingWelcome(true);
            setAiWelcomeMessage('');
            try {
              const prompt = `เขียนข้อความสั้นๆ 1-2 ประโยค เพื่ออวยพรและให้กำลังใจนักเรียนชื่อ "${fullName}" ที่เพิ่งลงทะเบียนเข้าร่วมโครงการ "Bestari Sholat" (โครงการทดสอบการละหมาด) ขอให้อัลลอฮ์ตอบแทนและให้ความสำเร็จ ใช้ภาษาที่อบอุ่นและเป็นกันเอง`;
              const generatedText = await callGeminiAPI(prompt);
              setAiWelcomeMessage(generatedText.trim());
            } catch (error) {
              console.error("AI Welcome Generation Error:", error);
              setAiWelcomeMessage(`ยินดีต้อนรับ ${fullName} สู่โครงการ ขอให้อัลลอฮ์ตอบแทนความตั้งใจของคุณครับ/ค่ะ`);
            } finally {
              setIsGeneratingWelcome(false);
            }
          };

          const exportToCSV = () => {
            if (registeredList.length === 0) return;
            const BOM = '\uFEFF';
            const headers = ['ลำดับ', 'วัน-เวลาที่ลงทะเบียน', 'รหัสนักเรียน', 'ชื่อ-นามสกุล', 'ห้องเรียน', 'ชื่อโครงการ'];
            const csvContent = registeredList.map((user, index) => {
              return [
                registeredList.length - index,
                `"${user.timestamp}"`,
                `"${user.studentId}"`,
                `"${user.fullName}"`,
                `"${user.room}"`,
                `"${user.projectTitle}"`
              ].join(',');
            });
            const csvData = BOM + headers.join(',') + '\n' + csvContent.join('\n');
            const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', `ข้อมูลลงทะเบียน_${projectSettings.title.replace(/\s+/g, '_')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          // ฟังก์ชันตรวจสอบรหัสผ่าน
          const handlePasswordSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === 'aaaaaa') {
              setIsUnlocked(true);
              setPasswordError('');
            } else {
              setPasswordError('รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง');
              setPasswordInput('');
            }
          };

          // ฟังก์ชันล็อคหน้าตั้งค่าใหม่
          const handleLockSettings = () => {
            setIsUnlocked(false);
            setPasswordInput('');
            setPasswordError('');
          };

          // ดาวน์โหลดเทมเพลต CSV
          const downloadTemplate = () => {
            const BOM = '\uFEFF';
            const csvContent = "id,title,firstName,lastName,room\n26858,เด็กชาย,อัซรี,เตะ,ม.1 Berdikari\n26906,เด็กชาย,ชารีฟ,ตีมุง,ม.1 Berdikari\n26913,เด็กชาย,อัซวาน,มะแซ,ม.1 Berdikari\n26920,เด็กชาย,นัสรุดดีน,สุหลง,ม.1 Amanah";
            const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'template_student_database.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          // ฟังก์ชันนำเข้า CSV และส่งข้อมูลอัปโหลดไปบันทึกยัง Google Sheets (ฟีเจอร์ใหม่)
          const handleCsvUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setUploadError('');
            setUploadSuccess('');

            const reader = new FileReader();
            reader.onload = async (event) => {
              const text = event.target.result;
              try {
                const lines = text.split(/\r?\n/);
                if (lines.length < 2) {
                  throw new Error('ไฟล์ว่างเปล่าหรือข้อมูลไม่ครบถ้วน');
                }

                const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, ''));
                const requiredHeaders = ['id', 'title', 'firstName', 'lastName', 'room'];
                
                // ตรวจสอบคอลัมน์
                const isHeaderValid = requiredHeaders.every(h => headers.includes(h));
                if (!isHeaderValid) {
                  throw new Error('รูปแบบคอลัมน์ไม่ถูกต้อง กรุณาใช้เทมเพลตที่ดาวน์โหลดจากระบบ');
                }

                const idxId = headers.indexOf('id');
                const idxTitle = headers.indexOf('title');
                const idxFirst = headers.indexOf('firstName');
                const idxLast = headers.indexOf('lastName');
                const idxRoom = headers.indexOf('room');

                const parsedStudents = [];

                for (let i = 1; i < lines.length; i++) {
                  const line = lines[i].trim();
                  if (!line) continue;

                  const cols = [];
                  let currentField = '';
                  let insideQuotes = false;
                  
                  for (let charIndex = 0; charIndex < line.length; charIndex++) {
                    const char = line[charIndex];
                    if (char === '"') {
                      insideQuotes = !insideQuotes;
                    } else if (char === ',' && !insideQuotes) {
                      cols.push(currentField.trim().replace(/^["']|["']$/g, ''));
                      currentField = '';
                    } else {
                      currentField += char;
                    }
                  }
                  cols.push(currentField.trim().replace(/^["']|["']$/g, ''));

                  if (cols.length >= 5) {
                    parsedStudents.push({
                      id: cols[idxId] || '',
                      title: cols[idxTitle] || '',
                      firstName: cols[idxFirst] || '',
                      lastName: cols[idxLast] || '',
                      room: cols[idxRoom] || ''
                    });
                  }
                }

                if (parsedStudents.length === 0) {
                  throw new Error('ไม่พบข้อมูลนักเรียนที่สมบูรณ์ในไฟล์นี้');
                }

                // เริ่มส่งข้อมูลขึ้น Google Sheets
                if (projectSettings.googleScriptUrl) {
                  setIsUploadingDb(true);
                  
                  // ส่ง POST ไปยัง Google Apps Script เพื่อบันทึกฐานข้อมูลลง Google Sheet
                  await fetch(projectSettings.googleScriptUrl, {
                    method: 'POST',
                    mode: 'no-cors', // ใช้ no-cors เนื่องจากเป็น App Script Redirect
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      action: 'uploadDatabase',
                      students: parsedStudents
                    })
                  });

                  // บันทึกสำรองใน Local Storage
                  localStorage.setItem('student_database', JSON.stringify(parsedStudents));
                  setStudentDb(parsedStudents);
                  setDbSource('sheet');
                  setUploadSuccess(`นำเข้าฐานข้อมูลและส่งไปยัง Google Sheets เรียบร้อย! (จำนวน ${parsedStudents.length} คน)`);
                } else {
                  throw new Error('กรุณาระบุ Google Apps Script URL ในระบบการเชื่อมต่อก่อนอัปโหลด');
                }
              } catch (err) {
                console.error(err);
                setUploadError(err.message || 'เกิดข้อผิดพลาดในการนำเข้าข้อมูล');
              } finally {
                setIsUploadingDb(false);
              }
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
          };

          // ลบฐานข้อมูลที่อัปโหลดและดึงใหม่
          const handleResetToDefault = () => {
            if (confirm('คุณต้องการล้างข้อมูลแคชสำรองและดึงข้อมูลใหม่จาก Google Sheets หรือไม่?')) {
              localStorage.removeItem('student_database');
              fetchDatabaseFromSheet(projectSettings.googleScriptUrl);
              setUploadSuccess('ทำการล้างข้อมูลแคชและเริ่มดึงข้อมูลใหม่แล้ว');
              setUploadError('');
            }
          };

          useEffect(() => {
            setImgError(false);
            if (searchId.length >= 5) {
              const found = studentDb.find(s => s.id === searchId);
              if (found) {
                setStudentInfo({ ...found, isEditing: false });
              } else {
                setStudentInfo({ isNew: true, id: searchId, title: '', firstName: '', lastName: '', room: '', isEditing: true });
              }
            } else {
              setStudentInfo(null);
            }
          }, [searchId, studentDb]);

          const handleRegister = async (e) => {
            e.preventDefault();
            if (!studentInfo) return;
            setIsSubmitting(true);
            setSubmitStatus(null);
            setAiWelcomeMessage('');
            const fullName = `${studentInfo.title || ''}${studentInfo.firstName} ${studentInfo.lastName}`;
            const dataToSubmit = {
              action: 'register', // ระบุแอคชั่นเพื่อให้ระบบแยกแยะได้
              timestamp: new Date().toLocaleString('th-TH'),
              studentId: studentInfo.id,
              fullName: fullName,
              room: studentInfo.room,
              projectTitle: projectSettings.title
            };
            try {
              setRegisteredList([dataToSubmit, ...registeredList]);
              if (projectSettings.googleScriptUrl) {
                await fetch(projectSettings.googleScriptUrl, {
                  method: 'POST',
                  mode: 'no-cors',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(dataToSubmit)
                });
              } else {
                await new Promise(resolve => setTimeout(resolve, 800));
              }
              setSubmitStatus('success');
              setRegisteredName(studentInfo.firstName);
              generateWelcomeMessage(studentInfo.firstName);
              setSearchId('');
              setStudentInfo(null);
              setTimeout(() => setSubmitStatus(null), 5000);
            } catch (error) {
              setSubmitStatus('error');
              console.error('Error submitting:', error);
            } finally {
              setIsSubmitting(false);
            }
          };

          return (
            <div className="min-h-screen text-gray-800 font-sans">
              <header className="bg-emerald-700 text-white shadow-md p-6">
                <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                  <div>
                    <h1 className="text-2xl font-bold">{projectSettings.title}</h1>
                    <p className="text-emerald-100 text-sm mt-1">{projectSettings.description}</p>
                  </div>
                  <div className="bg-emerald-800 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">
                    ลงทะเบียนแล้ว: {registeredList.length} คน
                  </div>
                </div>
              </header>

              {/* แสดงสถานะการโหลดฐานข้อมูลจาก Google Sheets */}
              {isLoadingDb && (
                <div className="bg-amber-50 text-amber-700 text-xs font-semibold text-center py-2 flex items-center justify-center gap-2 border-b border-amber-100">
                  <Loader2 className="animate-spin" size={14} /> 
                  <span>กำลังดึงข้อมูลนักเรียนจาก Google Sheet...</span>
                </div>
              )}
              {dbError && (
                <div className="bg-red-50 text-red-700 text-xs font-semibold text-center py-2 border-b border-red-100 flex items-center justify-center gap-2">
                  <AlertCircle size={14} />
                  <span>{dbError}</span>
                  <button onClick={() => fetchDatabaseFromSheet(projectSettings.googleScriptUrl)} className="underline hover:text-red-900 flex items-center gap-0.5">
                    <RefreshCw size={10} /> ลองใหม่
                  </button>
                </div>
              )}

              <div className="max-w-4xl mx-auto mt-6 px-4">
                <div className="flex bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                  <button onClick={() => { setActiveTab('register'); setSubmitStatus(null); setAiWelcomeMessage(''); }}
                    className={`flex-1 py-3 px-2 sm:px-4 flex items-center justify-center gap-2 font-medium transition-colors ${activeTab === 'register' ? 'bg-emerald-50 text-emerald-700 border-b-2 border-emerald-600' : 'text-gray-500 hover:bg-gray-50'}`}>
                    <ClipboardList size={18} />

                        {/* การตั้งค่าโครงการ (ทั่วไป) */}
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
                          <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-100 pb-3">
                            <Settings className="text-emerald-600" />
                            ตั้งค่ารายละเอียดโครงการ
                          </h3>
                          
                          <div className="space-y-6">
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">ชื่อโครงการ</label>
                              <input type="text"
                                value={projectSettings.title}
                                onChange={(e) => setProjectSettings({...projectSettings, title: e.target.value})}
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" />
                            </div>

                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">รายละเอียดโครงการ</label>
                              <textarea value={projectSettings.description}
                                onChange={(e) => setProjectSettings({...projectSettings, description: e.target.value})}
                                rows="3"
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none leading-relaxed" />
                              
                              <div className="mt-3 p-4 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-lg border border-indigo-100">
                                <label className="flex items-center gap-2 text-sm font-bold text-indigo-900 mb-2">
                                  <Sparkles size={16} className="text-indigo-500" />
                                  ผู้ช่วย AI ร่างรายละเอียด
                                </label>
                                <p className="text-xs text-indigo-700 mb-3">พิมพ์หัวข้อคร่าวๆ ที่ต้องการ แล้วให้ AI ช่วยร่างข้อความที่สละสลวยให้คุณ</p>
                                <div className="flex flex-col sm:flex-row gap-2">
                                  <input type="text"
                                    value={aiTopic}
                                    onChange={(e) => setAiTopic(e.target.value)}
                                    placeholder="เช่น เน้นมารยาทในการละหมาด หรือ การอาบน้ำละหมาดที่ถูกต้อง..."
                                    className="flex-1 p-2.5 text-sm border border-indigo-200 rounded-md focus:ring-2 focus:ring-indigo-400 outline-none"
                                    disabled={isGeneratingDesc} />
                                  <button onClick={handleGenerateDescription}
                                    disabled={isGeneratingDesc}
                                    className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 px-4 rounded-md transition-colors disabled:opacity-50 flex justify-center items-center gap-1 whitespace-nowrap shadow-sm">
                                    {isGeneratingDesc ? (
                                      <React.Fragment><Loader2 size={16} className="animate-spin" /> กำลังประมวลผล...</React.Fragment>
                                    ) : (
                                      <React.Fragment>✨ ร่างข้อความด้วย AI</React.Fragment>
                                    )}
                                  </button>
                                </div>
                                {descAiError && <p className="text-red-500 text-xs mt-2 font-medium">{descAiError}</p>}
                              </div>
                            </div>

                            <div className="pt-6 border-t border-gray-200">
                              <label className="block text-sm font-semibold text-gray-700 mb-1">การเชื่อมต่อฐานข้อมูล (Google Apps Script URL)</label>
                              <p className="text-xs text-gray-500 mb-3">นำ URL ที่ได้จากขั้นตอนการทำ Google Sheet มาวางที่นี่เพื่อส่งข้อมูลลงทะเบียนและดึงฐานข้อมูล</p>
                              <input type="text"
                                value={projectSettings.googleScriptUrl}
                                onChange={(e) => setProjectSettings({...projectSettings, googleScriptUrl: e.target.value})}
                                placeholder="https://script.google.com/macros/s/AKfycb.../exec"
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none font-mono text-sm bg-gray-50" />
                            </div>
                          </div>
                        </div>

                      </div>
                    )}
                  </div>
                )}
              </main>
            </div>
          );
        }

        // 4. สั่งให้ React เรนเดอร์หน้าเว็บ
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
