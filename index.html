<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนโครงการ - Bestari Sholat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', 'Outfit', sans-serif; 
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleUp {
          from { opacity: 0; transform: scale(0.97); }
          to { opacity: 1; transform: scale(1); }
        }
        .animate-fadeIn {
          animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-scaleUp {
          animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        /* ลายประดับอิสลามิก (Islamic Geometric Ornament CSS pattern) */
        .islamic-pattern {
            background-color: #047857;
            background-image: radial-gradient(rgba(217, 119, 6, 0.15) 1px, transparent 0), radial-gradient(rgba(217, 119, 6, 0.15) 1px, transparent 0);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react-dom/client": "https://esm.sh/react-dom@18/client",
            "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50/50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // 1. นำเข้า React และไลบรารีต่างๆ
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Settings, Users, ClipboardList, CheckCircle2, Search, Save, AlertCircle, Download, Sparkles, Loader2, MessageSquareHeart, Lock, Unlock, Upload, FileSpreadsheet, Trash2, RefreshCw, User, Plus, Edit2, Trash, X } from 'lucide-react';

        // 2. ข้อมูลจำลองตั้งต้นจากระบบ
        const defaultStudentData = [
          { id: '26858', title: 'เด็กชาย', firstName: 'อัซรี', lastName: 'เตะ', room: 'ม.1 Berdikari' },
          { id: '26906', title: 'เด็กชาย', firstName: 'ชารีฟ', lastName: 'ตีมุง', room: 'ม.1 Berdikari' },
          { id: '26913', title: 'เด็กชาย', firstName: 'อัซวาน', lastName: 'มะแซ', room: 'ม.1 Berdikari' },
          { id: '26920', title: 'เด็กชาย', firstName: 'นัสรุดดีน', lastName: 'สุหลง', room: 'ม.1 Amanah' },
          { id: '26931', title: 'เด็กชาย', firstName: 'แวมูฮัมมัด', lastName: 'เซ็ง', room: 'ม.1 Amanah' },
          { id: '26955', title: 'เด็กชาย', firstName: 'ธนภัตร์', lastName: 'หมัดเลียด', room: 'ม.1 Amanah' },
          { id: '27043', title: 'เด็กชาย', firstName: 'มูฮัมหมัดชารีฟ', lastName: 'มะแซ', room: 'ม.1 Amanah' },
        ];

        // 3. ฟังก์ชันหลักของระบบ
        function App() {
          const [activeTab, setActiveTab] = useState('register');
          
          const [projectSettings, setProjectSettings] = useState({
            title: 'Bestari Sholat Kali Ke-2',
            description: 'โครงการอบรมและทดสอบการปฏิบัติศาสนกิจ (ละหมาด) สำหรับนักเรียน',
            date: '2026-07-15',
            googleScriptUrl: 'https://script.google.com/macros/s/AKfycbzchn27ihihopxSVhBum1SMxdqyWq2gy1_ho71gLZsgqEOgBqafzsYptVPpXsEUXKLz/exec'
          });

          // ระบบฐานข้อมูลนักเรียน
          const [studentDb, setStudentDb] = useState([]);
          const [dbSource, setDbSource] = useState('loading');
          const [isLoadingDb, setIsLoadingDb] = useState(false);
          const [dbError, setDbError] = useState('');

          // ระบบรหัสผ่านหน้าตั้งค่า
          const [isUnlocked, setIsUnlocked] = useState(false);
          const [passwordInput, setPasswordInput] = useState('');
          const [passwordError, setPasswordError] = useState('');

          // โลโก้ระบบ
          const [systemLogo, setSystemLogo] = useState('');

          // รายชื่อผู้ลงทะเบียน (สำหรับ CRUD)
          const [registeredList, setRegisteredList] = useState([]);
          const [isLoadingRegs, setIsLoadingRegs] = useState(false);

          // การกรอกฟอร์มลงทะเบียนหลัก
          const [searchId, setSearchId] = useState('');
          const [studentInfo, setStudentInfo] = useState(null);
          const [isSubmitting, setIsSubmitting] = useState(false);
          const [submitStatus, setSubmitStatus] = useState(null);

          // รหัส AI และข้อความตอบรับ
          const [aiTopic, setAiTopic] = useState('');
          const [isGeneratingDesc, setIsGeneratingDesc] = useState(false);
          const [descAiError, setDescAiError] = useState('');
          const [aiWelcomeMessage, setAiWelcomeMessage] = useState('');
          const [isGeneratingWelcome, setIsGeneratingWelcome] = useState(false);
          const [registeredName, setRegisteredName] = useState('');

          // อัปโหลดข้อมูล CSV
          const [uploadError, setUploadError] = useState('');
          const [uploadSuccess, setUploadSuccess] = useState('');
          const [isUploadingDb, setIsUploadingDb] = useState(false);
          const [imgError, setImgError] = useState(false);

          // สถานะ Modals จัดการข้อมูล (CRUD)
          const [isCreateOpen, setIsCreateOpen] = useState(false);
          const [isEditOpen, setIsEditOpen] = useState(false);
          const [editingRecord, setEditingRecord] = useState(null);
          const [isDeleteOpen, setIsDeleteOpen] = useState(false);
          const [deletingRecord, setDeletingRecord] = useState(null);

          // ฟิลด์ข้อมูลของ Modals
          const [modalStudentId, setModalStudentId] = useState('');
          const [modalFullName, setModalFullName] = useState('');
          const [modalRoom, setModalRoom] = useState('');
          const [modalTimestamp, setModalTimestamp] = useState('');
          const [modalError, setModalError] = useState('');
          const [isModalSubmitting, setIsModalSubmitting] = useState(false);

          // โหลดข้อมูลเริ่มต้น
          useEffect(() => {
            // 1. โหลดโลโก้ระบบ
            const savedLogo = localStorage.getItem('system_logo');
            if (savedLogo) setSystemLogo(savedLogo);

            // 2. โหลดฐานข้อมูลนักเรียนสำรอง
            const savedDb = localStorage.getItem('student_database');
            if (savedDb) {
              try {
                const parsed = JSON.parse(savedDb);
                if (Array.isArray(parsed) && parsed.length > 0) {
                  setStudentDb(parsed);
                  setDbSource('local');
                } else {
                  setStudentDb(defaultStudentData);
                  setDbSource('default');
                }
              } catch (e) {
                setStudentDb(defaultStudentData);
                setDbSource('default');
              }
            } else {
              setStudentDb(defaultStudentData);
              setDbSource('default');
            }

            // 3. โหลดประวัติผู้ลงทะเบียน
            const savedRegs = localStorage.getItem('registrations');
            if (savedRegs) {
              try {
                setRegisteredList(JSON.parse(savedRegs));
              } catch(e) {}
            }
          }, []);

          // ดึงข้อมูลนักเรียนจาก Google Sheet
          const fetchDatabaseFromSheet = async (url) => {
            if (!url) return;
            setIsLoadingDb(true);
            setDbError('');
            try {
              const res = await fetch(`${url}?action=getStudents`);
              if (!res.ok) throw new Error('การเชื่อมต่อกับสคริปต์ทำงานผิดพลาด');
              const data = await res.json();
              if (Array.isArray(data) && data.length > 0) {
                setStudentDb(data);
                setDbSource('sheet');
                localStorage.setItem('student_database', JSON.stringify(data));
              } else {
                throw new Error('โครงสร้างไฟล์นักเรียนใน Google Sheet ไม่ถูกต้อง');
              }
            } catch (err) {
              console.error(err);
              setDbError('ดึงฐานข้อมูลจาก Google Sheets ล้มเหลว (ใช้ข้อมูลสำรองชั่วคราว)');
            } finally {
              setIsLoadingDb(false);
            }
          };

          // ดึงรายชื่อผู้ลงทะเบียนจาก Google Sheet
          const fetchRegistrationsFromSheet = async (url) => {
            if (!url) return;
            setIsLoadingRegs(true);
            try {
              const res = await fetch(`${url}?action=getRegistrations`);
              if (!res.ok) throw new Error('ดึงข้อมูลผู้ลงทะเบียนล้มเหลว');
              const data = await res.json();
              if (Array.isArray(data)) {
                setRegisteredList(data);
                localStorage.setItem('registrations', JSON.stringify(data));
              }
            } catch (err) {
              console.error(err);
            } finally {
              setIsLoadingRegs(false);
            }
          };

          // โหลดข้อมูลเมื่อ URL มีการเปลี่ยนแปลง
          useEffect(() => {
            if (projectSettings.googleScriptUrl) {
              fetchDatabaseFromSheet(projectSettings.googleScriptUrl);
              fetchRegistrationsFromSheet(projectSettings.googleScriptUrl);
            }
          }, [projectSettings.googleScriptUrl]);

          const callGeminiAPI = async (prompt) => {
            const apiKey = "YOUR_API_KEY_HERE"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const maxRetries = 5;
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { 
                      parts: [{ text: "คุณคือผู้ช่วย AI สำหรับโรงเรียนสอนศาสนาอิสลามในประเทศไทย มีความสุภาพ เป็นมิตร และใช้ภาษาที่เหมาะสมกับการให้ความรู้หรือให้กำลังใจนักเรียน" }] 
                    }
                  })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!generatedText) throw new Error("No text generated");
                return generatedText;
              } catch (error) {
                if (i === maxRetries - 1) throw error; 
                const delay = 1000 * Math.pow(2, i);
                await new Promise(resolve => setTimeout(resolve, delay));
              }
            }
          };

          const handleGenerateDescription = async () => {
            if (!aiTopic.trim()) {
              setDescAiError("กรุณาระบุหัวข้อที่ต้องการให้ AI ช่วยเขียน");
              setTimeout(() => setDescAiError(''), 3000);
              return;
            }
            setIsGeneratingDesc(true);
            setDescAiError('');
            try {
              const prompt = `ช่วยเขียนรายละเอียดโครงการแบบเป็นทางการสำหรับกิจกรรมของโรงเรียนมุสลิม ชื่อโครงการ: "${projectSettings.title}" โดยมีเนื้อหาเกี่ยวข้องกับ: "${aiTopic}" ขอให้เขียนสรุปสั้นๆ ประมาณ 1 ย่อหน้า ไม่เกิน 3-4 ประโยค เพื่อนำไปแสดงบนหน้าเว็บไซต์`;
              const generatedText = await callGeminiAPI(prompt);
              setProjectSettings(prev => ({ ...prev, description: generatedText.trim() }));
              setAiTopic('');
            } catch (error) {
              console.error("AI Generation Error:", error);
              setDescAiError("เกิดข้อผิดพลาดในการเชื่อมต่อกับ AI กรุณาลองใหม่อีกครั้ง");
            } finally {
              setIsGeneratingDesc(false);
            }
          };

          const generateWelcomeMessage = async (fullName) => {
            setIsGeneratingWelcome(true);
            setAiWelcomeMessage('');
            try {
              const prompt = `เขียนข้อความสั้นๆ 1-2 ประโยค เพื่ออวยพรและให้กำลังใจนักเรียนชื่อ "${fullName}" ที่เพิ่งลงทะเบียนเข้าร่วมโครงการ "Bestari Sholat" (โครงการทดสอบการละหมาด) ขอให้อัลลอฮ์ตอบแทนและให้ความสำเร็จ ใช้ภาษาที่อบอุ่นและเป็นกันเอง`;
              const generatedText = await callGeminiAPI(prompt);
              setAiWelcomeMessage(generatedText.trim());
            } catch (error) {
              console.error("AI Welcome Generation Error:", error);
              setAiWelcomeMessage(`ยินดีต้อนรับ ${fullName} สู่โครงการ ขอให้อัลลอฮ์ตอบแทนความตั้งใจของคุณครับ/ค่ะ`);
            } finally {
              setIsGeneratingWelcome(false);
            }
          };

          // ฟังก์ชันนำเข้าและอัปเดตไฟล์ CSV
          const handleCsvUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setUploadError('');
            setUploadSuccess('');

            const reader = new FileReader();
            reader.onload = async (event) => {
              const text = event.target.result;
              try {
                const lines = text.split(/\r?\n/);
                if (lines.length < 2) {
                  throw new Error('ไฟล์ว่างเปล่าหรือข้อมูลไม่ครบถ้วน');
                }

                const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, ''));
                const requiredHeaders = ['id', 'title', 'firstName', 'lastName', 'room'];
                
                const isHeaderValid = requiredHeaders.every(h => headers.includes(h));
                if (!isHeaderValid) {
                  throw new Error('รูปแบบคอลัมน์ไม่ถูกต้อง กรุณาใช้เทมเพลตที่ดาวน์โหลดจากระบบ');
                }

                const idxId = headers.indexOf('id');
                const idxTitle = headers.indexOf('title');
                const idxFirst = headers.indexOf('firstName');
                const idxLast = headers.indexOf('lastName');
                const idxRoom = headers.indexOf('room');

                const parsedStudents = [];

                for (let i = 1; i < lines.length; i++) {
                  const line = lines[i].trim();
                  if (!line) continue;

                  const cols = [];
                  let currentField = '';
                  let insideQuotes = false;
                  
                  for (let charIndex = 0; charIndex < line.length; charIndex++) {
                    const char = line[charIndex];
                    if (char === '"') {
                      insideQuotes = !insideQuotes;
                    } else if (char === ',' && !insideQuotes) {
                      cols.push(currentField.trim().replace(/^["']|["']$/g, ''));
                      currentField = '';
                    } else {
                      currentField += char;
                    }
                  }
                  cols.push(currentField.trim().replace(/^["']|["']$/g, ''));

                  if (cols.length >= 5) {
                    parsedStudents.push({
                      id: cols[idxId] || '',
                      title: cols[idxTitle] || '',
                      firstName: cols[idxFirst] || '',
                      lastName: cols[idxLast] || '',
                      room: cols[idxRoom] || ''
                    });
                  }
                }

                if (parsedStudents.length === 0) {
                  throw new Error('ไม่พบข้อมูลนักเรียนที่สมบูรณ์ในไฟล์นี้');
                }

                if (projectSettings.googleScriptUrl) {
                  setIsUploadingDb(true);
                  
                  await fetch(projectSettings.googleScriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      action: 'uploadDatabase',
                      students: parsedStudents
                    })
                  });

                  localStorage.setItem('student_database', JSON.stringify(parsedStudents));
                  setStudentDb(parsedStudents);
                  setDbSource('sheet');
                  setUploadSuccess(`นำเข้าฐานข้อมูลและส่งไปยัง Google Sheets เรียบร้อย! (จำนวน ${parsedStudents.length} คน)`);
                } else {
                  throw new Error('กรุณาระบุ Google Apps Script URL ในระบบการเชื่อมต่อก่อนอัปโหลด');
                }
              } catch (err) {
                console.error(err);
                setUploadError(err.message || 'เกิดข้อผิดพลาดในการนำเข้าข้อมูล');
              } finally {
                setIsUploadingDb(false);
              }
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
          };

          // จัดการการอัปโหลดโลโก้ระบบ
          const handleLogoUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const base64Data = event.target.result;
              setSystemLogo(base64Data);
              localStorage.setItem('system_logo', base64Data);
            };
            reader.readAsDataURL(file);
          };

          // ลบโลโก้ระบบ
          const handleResetLogo = () => {
            setSystemLogo('');
            localStorage.removeItem('system_logo');
          };

          // ล้างฐานข้อมูลและดึงใหม่
          const handleResetToDefault = () => {
            if (confirm('คุณต้องการล้างข้อมูลแคชสำรองและดึงข้อมูลใหม่จาก Google Sheets หรือไม่?')) {
              localStorage.removeItem('student_database');
              fetchDatabaseFromSheet(projectSettings.googleScriptUrl);
              setUploadSuccess('ทำการล้างข้อมูลแคชและเริ่มดึงข้อมูลใหม่แล้ว');
              setUploadError('');
            }
          };

          useEffect(() => {
            setImgError(false);
            if (searchId.length >= 5) {
              const found = studentDb.find(s => s.id === searchId);
              if (found) {
                setStudentInfo({ ...found, isEditing: false });
              } else {
                setStudentInfo({ isNew: true, id: searchId, title: '', firstName: '', lastName: '', room: '', isEditing: true });
              }
            } else {
              setStudentInfo(null);
            }
          }, [searchId, studentDb]);

          // ฟังก์ชันสมัครลงทะเบียนจากฟอร์มหลัก
          const handleRegister = async (e) => {
            e.preventDefault();
            if (!studentInfo) return;
            setIsSubmitting(true);
            setSubmitStatus(null);
            setAiWelcomeMessage('');
            const fullName = `${studentInfo.title || ''}${studentInfo.firstName} ${studentInfo.lastName}`;
            const dataToSubmit = {
              action: 'register',
              timestamp: new Date().toLocaleString('th-TH'),
              studentId: studentInfo.id,
              fullName: fullName,
              room: studentInfo.room,
              projectTitle: projectSettings.title
            };
            try {
              if (projectSettings.googleScriptUrl) {
                await fetch(projectSettings.googleScriptUrl, {
                  method: 'POST',
                  mode: 'no-cors',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(dataToSubmit)
                });
                // รีเฟรชข้อมูลตาราง
                fetchRegistrationsFromSheet(projectSettings.googleScriptUrl);
              } else {
                await new Promise(resolve => setTimeout(resolve, 800));
                setRegisteredList([dataToSubmit, ...registeredList]);
              }
              setSubmitStatus('success');
              setRegisteredName(studentInfo.firstName);
              generateWelcomeMessage(studentInfo.firstName);
              setSearchId('');
              setStudentInfo(null);
              setTimeout(() => setSubmitStatus(null), 5000);
            } catch (error) {
              setSubmitStatus('error');
              console.error('Error submitting:', error);
            } finally {
              setIsSubmitting(false);
            }
          };

          // ==========================================
          // ระบบ CRUD สำหรับตารางผู้ลงทะเบียน
          // ==========================================

          // เปิด Modal เพิ่มข้อมูล (C)
          const openCreateModal = () => {
            setModalStudentId('');
            setModalFullName('');
            setModalRoom('');
            setModalError('');
            setIsCreateOpen(true);
          };

          // ยืนยันการเพิ่มข้อมูล (C)
          const handleCreateConfirm = async (e) => {
            e.preventDefault();
            if (!modalStudentId.trim() || !modalFullName.trim() || !modalRoom.trim()) {
              setModalError('กรุณากรอกข้อมูลให้ครบถ้วนทุกช่อง');
              return;
            }
            setIsModalSubmitting(true);
            setModalError('');
            
            const timestamp = new Date().toLocaleString('th-TH');
            const dataToSubmit = {
              action: 'createRegistration',
              timestamp: timestamp,
              studentId: modalStudentId.trim(),
              fullName: modalFullName.trim(),
              room: modalRoom.trim(),
              projectTitle: projectSettings.title
            };

            try {
              if (projectSettings.googleScriptUrl) {
                await fetch(projectSettings.googleScriptUrl, {
                  method: 'POST',
                  mode: 'no-cors',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(dataToSubmit)
                });
                // โหลดตารางใหม่จากคลาวด์
                await fetchRegistrationsFromSheet(projectSettings.googleScriptUrl);
              } else {
                const newList = [dataToSubmit, ...registeredList];
                setRegisteredList(newList);
                localStorage.setItem('registrations', JSON.stringify(newList));
              }
              setIsCreateOpen(false);
            } catch (err) {
              console.error(err);

              oldTimestamp: editingRecord.timestamp,
              oldStudentId: editingRecord.studentId,

                studentId: modalStudentId,
                fullName: modalFullName.trim(),
                room: modalRoom.trim(),
                projectTitle: projectSettings.title

                  method: 'POST',
                  mode: 'no-cors',
                  headers: { 'Content-Type': 'application/json' },

                      </div>

                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1.5">ชื่อจริง - นามสกุล</label>
                        <input type="text"
                          value={modalFullName}
                          onChange={(e) => setModalFullName(e.target.value)}
                          placeholder="ด.ช. อัซรี เตะ"
                          className="w-full p-3 border border-slate-200 rounded-xl focus:ring-1 focus:ring-emerald-500 outline-none text-sm"
                          required />
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1.5">ระดับชั้น / ห้องเรียน</label>
                        <input type="text"
                          value={modalRoom}
                          onChange={(e) => setModalRoom(e.target.value)}
                          placeholder="ม.1 Berdikari"
                          className="w-full p-3 border border-slate-200 rounded-xl focus:ring-1 focus:ring-emerald-500 outline-none text-sm"
                          required />
                      </div>
                    </div>

                    <div className="flex gap-2 pt-2 border-t border-slate-100">
                      <button type="button" onClick={() => setIsCreateOpen(false)}
                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-3 rounded-xl transition-colors">
                        ยกเลิก
                      </button>
                      <button type="submit" disabled={isModalSubmitting}
                        className="flex-1 bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-1.5">
                        {isModalSubmitting ? <Loader2 size={16} className="animate-spin" /> : <Save size={16} />}
                        <span>เพิ่มลงทะเบียน</span>
                      </button>
                    </div>
                  </form>
                </div>
              )}

              {/* B. Modal สำหรับแก้ไขข้อมูล (U) */}
              {isEditOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                  <form onSubmit={handleEditConfirm} className="bg-white rounded-3xl shadow-2xl border border-slate-100 max-w-md w-full p-6 space-y-4 animate-scaleUp">
                    <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                      <h3 className="font-bold text-slate-800 text-md flex items-center gap-1.5">
                        <Edit2 className="text-emerald-700" size={16} />
                        แก้ไขข้อมูลผู้ลงทะเบียน
                      </h3>
                      <button type="button" onClick={() => setIsEditOpen(false)} className="text-slate-400 hover:text-slate-600"><X size={20} /></button>
                    </div>

                    {modalError && (
                      <div className="bg-red-50 border border-red-200 text-red-700 text-xs px-3.5 py-2.5 rounded-xl flex items-center gap-2">
                        <AlertCircle size={16} />
                        <span>{modalError}</span>
                      </div>
                    )}

                    <div className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1.5">รหัสนักเรียน (ห้ามแก้ไข)</label>
                        <input type="text"
                          value={modalStudentId}
                          disabled
                          className="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-400 font-mono text-sm" />
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1.5">ชื่อจริง - นามสกุล</label>
                        <input type="text"
                          value={modalFullName}
                          onChange={(e) => setModalFullName(e.target.value)}
                          className="w-full p-3 border border-slate-200 rounded-xl focus:ring-1 focus:ring-emerald-500 outline-none text-sm"
                          required />
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1.5">ระดับชั้น / ห้องเรียน</label>
                        <input type="text"
                          value={modalRoom}
                          onChange={(e) => setModalRoom(e.target.value)}
                          className="w-full p-3 border border-slate-200 rounded-xl focus:ring-1 focus:ring-emerald-500 outline-none text-sm"
                          required />
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1.5">วันเวลาลงทะเบียน (แคช)</label>
                        <input type="text"
                          value={modalTimestamp}
                          onChange={(e) => setModalTimestamp(e.target.value)}
                          className="w-full p-3 border border-slate-200 rounded-xl focus:ring-1 focus:ring-emerald-500 outline-none text-sm"
                          required />
                      </div>
                    </div>

                    <div className="flex gap-2 pt-2 border-t border-slate-100">
                      <button type="button" onClick={() => setIsEditOpen(false)}
                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-3 rounded-xl transition-colors">
                        ยกเลิก
                      </button>
                      <button type="submit" disabled={isModalSubmitting}
                        className="flex-1 bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-1.5">
                        {isModalSubmitting ? <Loader2 size={16} className="animate-spin" /> : <Save size={16} />}
                        <span>บันทึกการแก้ไข</span>
                      </button>
                    </div>
                  </form>
                </div>
              )}

              {/* C. Modal ยืนยันการลบข้อมูล (D) */}
              {isDeleteOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                  <div className="bg-white rounded-3xl shadow-2xl border border-slate-100 max-w-sm w-full p-6 space-y-4 animate-scaleUp text-center">
                    <div className="mx-auto w-14 h-14 bg-red-50 rounded-full flex items-center justify-center text-red-600 ring-8 ring-red-500/5">
                      <Trash size={26} />
                    </div>
                    <div>
                      <h3 className="font-bold text-slate-800 text-lg">ต้องการลบข้อมูลจริงหรือไม่?</h3>
                      <p className="text-xs text-slate-500 mt-1.5 leading-relaxed">
                        คุณกำลังดำเนินการลบข้อมูลของ **{deletingRecord?.fullName}** ({deletingRecord?.studentId}) การกระทำนี้ไม่สามารถย้อนคืนได้เมื่อบันทึกลงชีทแล้ว
                      </p>
                    </div>

                    <div className="flex gap-2 pt-2 border-t border-slate-100">
                      <button type="button" onClick={() => setIsDeleteOpen(false)}
                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-3 rounded-xl transition-colors">
                        ยกเลิก
                      </button>
                      <button type="button" onClick={handleDeleteConfirm} disabled={isModalSubmitting}
                        className="flex-1 bg-red-600 hover:bg-red-700 text-white text-xs font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-1.5">
                        {isModalSubmitting ? <Loader2 size={16} className="animate-spin" /> : <Trash2 size={16} />}
                        <span>ยืนยันการลบ</span>
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        // 4. สั่งให้ React เรนเดอร์หน้าเว็บ
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
